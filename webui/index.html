<!doctype html>
<html><head><meta charset="utf-8"><title>SEALTorch WebUI</title>
<style>
body{margin:0;background:#10131a;color:#e8edf5;font:15px system-ui,sans-serif}main{max-width:1100px;margin:28px auto;padding:0 18px}.muted{color:#9aa7ba}.grid{display:grid;grid-template-columns:330px 1fr;gap:22px}.card{background:#191e28;border:1px solid #2a3445;border-radius:12px;padding:16px}canvas{width:280px;height:280px;background:#000;border-radius:8px;touch-action:none}button,select{background:#4b8bff;color:white;border:0;border-radius:7px;padding:10px 15px;margin:10px 6px 0 0;cursor:pointer}select{background:#303b4d}.secondary{background:#303b4d}.status{margin-top:10px;color:#9aa7ba}.bars{display:grid;gap:7px}.bar{display:grid;grid-template-columns:28px 1fr 62px;align-items:center;gap:8px}.track{height:16px;background:#303847;border-radius:5px;overflow:hidden}.fill{height:100%;background:#4b8bff}.top{background:#35d07f}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{background:#202735;border-radius:8px;padding:12px}.metric b{display:block;font-size:19px;margin-top:4px}.compare{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}@media(max-width:760px){.grid,.compare{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}}
</style></head><body><main>
<h1>SEALTorch</h1><div class="muted">Encrypted MNIST inference and cost comparison</div>
<div class="grid" style="margin-top:20px"><section class="card">
<canvas id="draw" width="280" height="280"></canvas><br><label>Backend <select id="backend"><option value="packed">Packed</option><option value="scalar">Scalar baseline</option></select></label><br><button onclick="predict()">Predict encrypted</button><button class="secondary" onclick="clearCanvas()">Clear</button><div id="status" class="status">Draw a digit, then predict.</div>
</section><section><div class="card"><h2>Probabilities</h2><div id="probabilities" class="bars"></div></div>
<div class="card" style="margin-top:18px"><h2>Runtime and memory</h2><div id="metrics" class="metrics"></div><p class="muted">Error metrics compare encrypted output with the plaintext model using a 1e-3 absolute-error tolerance.</p></div>
<div class="compare"><div class="card"><h2>Encrypted output</h2><div id="encrypted" class="bars"></div></div><div class="card"><h2>Plaintext output</h2><div id="plain" class="bars"></div></div></div>
</section></div></main>
<script>
const canvas=document.getElementById('draw'),ctx=canvas.getContext('2d');ctx.fillStyle='black';ctx.fillRect(0,0,280,280);ctx.lineWidth=18;ctx.lineCap='round';ctx.strokeStyle='white';let drawing=false;
function point(e){const r=canvas.getBoundingClientRect();return[(e.clientX-r.left)*280/r.width,(e.clientY-r.top)*280/r.height]};canvas.onpointerdown=e=>{drawing=true;canvas.setPointerCapture(e.pointerId);const p=point(e);ctx.beginPath();ctx.moveTo(p[0],p[1])};canvas.onpointermove=e=>{if(!drawing)return;const p=point(e);ctx.lineTo(p[0],p[1]);ctx.stroke()};canvas.onpointerup=()=>drawing=false;
function clearCanvas(){ctx.fillStyle='black';ctx.fillRect(0,0,280,280);ctx.strokeStyle='white';document.getElementById('status').textContent='Draw a digit, then predict.'}
function pixels(){const d=ctx.getImageData(0,0,280,280).data,o=[];for(let y=0;y<28;y++)for(let x=0;x<28;x++){let s=0;for(let yy=0;yy<10;yy++)for(let xx=0;xx<10;xx++)s+=d[((y*10+yy)*280+x*10+xx)*4];o.push(s/(100*255))}return o}
function bars(id,values,percent){const box=document.getElementById(id);box.innerHTML='';const max=Math.max(...values.map(Math.abs),1e-12);values.forEach((v,i)=>{const row=document.createElement('div');row.className='bar';const label=document.createElement('span');label.textContent=i;const track=document.createElement('div');track.className='track';const fill=document.createElement('div');fill.className='fill'+(i===values.indexOf(Math.max(...values))?' top':'');fill.style.width=(Math.abs(v)/max*100)+'%';track.appendChild(fill);const text=document.createElement('span');text.textContent=percent?(v*100).toFixed(1)+'%':v.toFixed(3);row.append(label,track,text);box.appendChild(row)})}
function metric(name,value){return '<div class="metric"><span class="muted">'+name+'</span><b>'+value+'</b></div>'}
async function predict(){document.getElementById('status').textContent='Encrypting and evaluating...';try{const response=await fetch('/api/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pixels:pixels(),backend:document.getElementById('backend').value})});const r=await response.json();if(r.error)throw Error(r.error);const e=r.encrypted,ex=e.map(Math.exp),total=ex.reduce((a,b)=>a+b,0);bars('probabilities',ex.map(x=>x/total),true);bars('encrypted',r.encrypted,false);bars('plain',r.plain,false);document.getElementById('metrics').innerHTML=metric('Backend',r.backend)+metric('Encrypted',r.encrypted_ms.toFixed(0)+' ms')+metric('Plaintext',r.plain_ms.toFixed(3)+' ms')+metric('Max error',r.max_abs_error.toExponential(2))+metric('Mean error',r.mean_abs_error.toExponential(2))+metric('Memory',r.memory_after_mb.toFixed(1)+' MB')+metric('Ciphertext',(r.ciphertext_bytes/1024).toFixed(0)+' KB');document.getElementById('status').textContent='Prediction: '+e.indexOf(Math.max(...e))+'; '+r.different_values+' values differ > tolerance'}catch(e){document.getElementById('status').textContent='Error: '+e.message}}
</script></body></html>
